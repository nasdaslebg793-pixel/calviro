<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APL — Calviro</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <nav class="nav">
    <a href="index.html" class="brand"><span class="brand-dot"></span>Calviro</a>
    <a href="index.html" class="back">← Retour</a>
  </nav>

  <div class="tool">
    <div class="tool-header">
      <h1>🏠 APL — Aide au logement</h1>
      <p>Estimation indicative de l'aide personnalisée au logement.</p>
    </div>

    <div class="field">
      <label for="apl-loyer">Loyer mensuel charges comprises (€)</label>
      <input type="number" id="apl-loyer" placeholder="500" min="0">
    </div>

    <div class="field">
      <label for="apl-revenu">Revenu annuel net (€)</label>
      <input type="number" id="apl-revenu" placeholder="18 000" min="0">
    </div>

    <div class="field-row">
      <div class="field">
        <label for="apl-zone">Zone</label>
        <select id="apl-zone">
          <option value="1">Zone 1 — Paris & banlieue</option>
          <option value="2" selected>Zone 2 — Grandes villes</option>
          <option value="3">Zone 3 — Reste du territoire</option>
        </select>
      </div>
      <div class="field">
        <label for="apl-compo">Situation</label>
        <select id="apl-compo">
          <option value="seul">Seul</option>
          <option value="couple">Couple</option>
          <option value="famille">Avec enfant(s)</option>
        </select>
      </div>
    </div>

    <button class="btn" onclick="calcAPL()">Estimer mon APL</button>

    <div class="result" id="apl-result"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
