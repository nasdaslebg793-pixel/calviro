<!-- Dans ton index.html -->
<div class="container">
    <h1>Simulateur Bac 2026</h1>
    
    <!-- Choix du Bac -->
    <label>Choisis ton Bac :</label>
    <select id="select-bac" onchange="chargerMatieres()">
        <option value="general">Général</option>
        <option value="stmg">STMG</option>
        <option value="sti2d">STI2D</option>
    </select>

    <!-- Choix du Trimestre -->
    <div class="tabs">
        <button onclick="changeTrimestre(1)">Trimestre 1</button>
        <button onclick="changeTrimestre(2)">Trimestre 2</button>
        <button onclick="changeTrimestre(3)">Trimestre 3</button>
    </div>

    <!-- Zone où les matières s'afficheront via JS -->
    <div id="matieres-container"></div>

    <button id="btn-pdf" onclick="genererPDF()">Télécharger mon PDF</button>
</div>

<!-- Librairie PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
