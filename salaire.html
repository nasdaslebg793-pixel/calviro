<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salaire net ↔ brut — Calviro</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <nav class="nav">
    <a href="index.html" class="brand"><span class="brand-dot"></span>Calviro</a>
    <a href="index.html" class="back">← Retour</a>
  </nav>

  <div class="tool">
    <div class="tool-header">
      <h1>💰 Salaire net ↔ brut</h1>
      <p>Conversion rapide selon ton statut professionnel.</p>
    </div>

    <div class="field-row">
      <div class="field">
        <label for="sal-sens">Sens de conversion</label>
        <select id="sal-sens">
          <option value="brut-net">Brut → Net</option>
          <option value="net-brut">Net → Brut</option>
        </select>
      </div>
      <div class="field">
        <label for="sal-statut">Statut</label>
        <select id="sal-statut">
          <option value="non-cadre">Non-cadre (privé)</option>
          <option value="cadre">Cadre (privé)</option>
          <option value="fonction">Fonction publique</option>
        </select>
      </div>
    </div>

    <div class="field">
      <label for="sal-input">Salaire mensuel (€)</label>
      <input type="number" id="sal-input" placeholder="2 500" min="0">
    </div>

    <button class="btn" onclick="calcSalaire()">Calculer</button>

    <div class="result" id="sal-result"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
