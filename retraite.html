<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retraite — Calviro</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <nav class="nav">
    <a href="index.html" class="brand"><span class="brand-dot"></span>Calviro</a>
    <a href="index.html" class="back">← Retour</a>
  </nav>

  <div class="tool">
    <div class="tool-header">
      <h1>👴 Estimation retraite</h1>
      <p>Pension mensuelle approximative selon ta carrière.</p>
    </div>

    <div class="field">
      <label for="ret-salaire">Salaire brut mensuel actuel (€)</label>
      <input type="number" id="ret-salaire" placeholder="3 000" min="0">
    </div>

    <div class="field-row">
      <div class="field">
        <label for="ret-trimestres">Trimestres cotisés</label>
        <input type="number" id="ret-trimestres" placeholder="172" min="0" max="200">
      </div>
      <div class="field">
        <label for="ret-age">Âge de départ</label>
        <input type="number" id="ret-age" placeholder="64" min="55" max="75">
      </div>
    </div>

    <button class="btn" onclick="calcRetraite()">Estimer ma pension</button>

    <div class="result" id="ret-result"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
