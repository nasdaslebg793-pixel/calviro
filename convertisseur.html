<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Convertisseur d'unités — Calviro</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <nav class="nav">
    <a href="index.html" class="brand"><span class="brand-dot"></span>Calviro</a>
    <a href="index.html" class="back">← Retour</a>
  </nav>

  <div class="tool">
    <div class="tool-header">
      <h1>🔄 Convertisseur</h1>
      <p>Longueurs, masses, volumes, temps, énergies, températures.</p>
    </div>

    <div class="field">
      <label for="conv-cat">Catégorie</label>
      <select id="conv-cat" onchange="convRender()">
        <option value="longueur">Longueur</option>
        <option value="masse">Masse</option>
        <option value="volume">Volume</option>
        <option value="temps">Temps</option>
        <option value="energie">Énergie</option>
        <option value="temperature">Température</option>
      </select>
    </div>

    <div class="field">
      <label for="conv-input">Valeur</label>
      <input type="number" id="conv-input" placeholder="1" step="any">
    </div>

    <div class="field">
      <label>De → Vers</label>
      <div class="field-row" id="conv-units" style="margin-bottom:0;"></div>
    </div>

    <button class="btn" onclick="convCalc()">Convertir</button>

    <div class="result" id="conv-result"></div>
  </div>
</div>

<script src="script.js"></script>
<script>convRender();</script>
</body>
</html>
