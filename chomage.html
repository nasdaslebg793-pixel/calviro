<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Allocation chômage — Calviro</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <nav class="nav">
    <a href="index.html" class="brand"><span class="brand-dot"></span>Calviro</a>
    <a href="index.html" class="back">← Retour</a>
  </nav>

  <div class="tool">
    <div class="tool-header">
      <h1>📉 Allocation chômage</h1>
      <p>Estimation simplifiée de ton ARE mensuelle.</p>
    </div>

    <div class="field">
      <label for="cho-salaire">Salaire brut mensuel (€)</label>
      <input type="number" id="cho-salaire" placeholder="2 500" min="0">
    </div>

    <div class="field">
      <label for="cho-age">Âge</label>
      <input type="number" id="cho-age" placeholder="30" min="18" max="70" value="30">
    </div>

    <button class="btn" onclick="calcChomage()">Estimer mon ARE</button>

    <div class="result" id="cho-result"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
