<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calcul de facture — Calviro</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <nav class="nav">
    <a href="index.html" class="brand"><span class="brand-dot"></span>Calviro</a>
    <a href="index.html" class="back">← Retour</a>
  </nav>

  <div class="tool">
    <div class="tool-header">
      <h1>🧾 Calcul de facture</h1>
      <p>Convertis montant HT en TTC selon le taux de TVA.</p>
    </div>

    <div class="field">
      <label for="fac-ht">Montant HT (€)</label>
      <input type="number" id="fac-ht" placeholder="100" step="0.01">
    </div>

    <div class="field">
      <label for="fac-tva">Taux de TVA (%)</label>
      <select id="fac-tva">
        <option value="20">20 % — Taux normal</option>
        <option value="10">10 % — Taux intermédiaire</option>
        <option value="5.5">5,5 % — Taux réduit</option>
        <option value="2.1">2,1 % — Taux super réduit</option>
        <option value="0">0 % — Exonéré</option>
      </select>
    </div>

    <button class="btn" onclick="calcFacture()">Calculer</button>

    <div class="result" id="fac-result"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
