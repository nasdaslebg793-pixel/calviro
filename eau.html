<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Besoin en eau — Calviro</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <nav class="nav">
    <a href="index.html" class="brand"><span class="brand-dot"></span>Calviro</a>
    <a href="index.html" class="back">← Retour</a>
  </nav>

  <div class="tool">
    <div class="tool-header">
      <h1>💧 Besoin en eau quotidien</h1>
      <p>Quantité recommandée selon ton poids et ton activité.</p>
    </div>

    <div class="field">
      <label for="eau-poids">Poids (kg)</label>
      <input type="number" id="eau-poids" placeholder="70" min="0" step="0.1">
    </div>

    <div class="field">
      <label for="eau-sport">Heures de sport / jour</label>
      <input type="number" id="eau-sport" placeholder="0" min="0" step="0.5" value="0">
    </div>

    <button class="btn" onclick="calcEau()">Calculer</button>

    <div class="result" id="eau-result"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
